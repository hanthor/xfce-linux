name: Build XFCE Linux (BuildGrid)

on:
  workflow_dispatch:
    inputs:
      push_image:
        description: 'Push OCI image to GHCR'
        type: boolean
        default: true
  schedule:
    - cron: '0 7 * * *'
  push:
    branches: [main]
    paths:
      - 'elements/**'
      - 'project.conf'

env:
  IMAGE_NAME: xfce-linux
  IMAGE_REGISTRY: ghcr.io/${{ github.repository_owner }}
  BST_TARGET: oci/xfce-linux.bst
  BST2_IMAGE: ghcr.io/hanthor/bst2:latest
  BUILDGRID_ENDPOINT: grpc://buildgrid.manatee-basking.ts.net:50051

concurrency:
  group: buildgrid-xfce-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
      - name: Restore BST staged junctions
        run: |
          # Staged junctions are gitlinks - clone them at pinned commits
          git clone --no-checkout https://gitlab.gnome.org/GNOME/gnome-build-meta.git \
            ".bst/staged-junctions/gnome-build-meta.bst/70a9a4fdaf1e84d70ccc871ea316be3e2f2be870723bda7cd07d7bca06b053c9" 2>/dev/null || true
          git -C ".bst/staged-junctions/gnome-build-meta.bst/70a9a4fdaf1e84d70ccc871ea316be3e2f2be870723bda7cd07d7bca06b053c9" checkout c918b12e3970866717917090396b416b15f45fd0 2>/dev/null || true

          git clone --no-checkout https://gitlab.freedesktop.org/freedesktop-sdk/freedesktop-sdk.git \
            ".bst/staged-junctions/freedesktop-sdk.bst/f3b0d4f66c9a628b0453e7030963eb530e55fb69ca70d8c6402bbe8dd3108800" 2>/dev/null || true
          git -C ".bst/staged-junctions/freedesktop-sdk.bst/f3b0d4f66c9a628b0453e7030963eb530e55fb69ca70d8c6402bbe8dd3108800" checkout 3361ede6aa02d79d2861e9c8782c799ab07d1cea 2>/dev/null || true

          ls ".bst/staged-junctions/gnome-build-meta.bst/70a9a4fdaf1e84d70ccc871ea316be3e2f2be870723bda7cd07d7bca06b053c9/project.conf" && echo "✓ gnome-build-meta staged junction ready"
          ls ".bst/staged-junctions/freedesktop-sdk.bst/f3b0d4f66c9a628b0453e7030963eb530e55fb69ca70d8c6402bbe8dd3108800/project.conf" && echo "✓ freedesktop-sdk staged junction ready"

      - uses: extractions/setup-just@v4

      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Verify BuildGrid reachable
        run: nc -zv buildgrid.manatee-basking.ts.net 50051 && echo "✓ BuildGrid reachable"

      - name: Cache BST sources
        uses: actions/cache@v4
        with:
          path: ~/.cache/buildstream/sources
          key: bst-sources-xfce-${{ hashFiles('elements/**/*.bst') }}
          restore-keys: bst-sources-xfce-

      - name: Pull bst2 image
        run: podman pull "$BST2_IMAGE"

      - name: Write BuildGrid config
        run: |
          cat > buildgrid-remote.conf << 'EOF'
          remote-execution:
            execution-service:
              url: ${{ env.BUILDGRID_ENDPOINT }}
              instance-name: ""
            storage-service:
              url: ${{ env.BUILDGRID_ENDPOINT }}
              instance-name: ""
            action-cache-service:
              url: ${{ env.BUILDGRID_ENDPOINT }}
              instance-name: ""
          EOF

      - name: Build ${{ env.BST_TARGET }}
        run: |
          BST_FLAGS="--no-interactive --config /src/buildgrid-remote.conf \
            --max-jobs 4 --fetchers 8" \
          just bst build "$BST_TARGET"

      - name: Export OCI image
        run: |
          mkdir -p /tmp/oci-export
          BST_FLAGS="--no-interactive" just bst artifact checkout \
            "$BST_TARGET" --directory /tmp/oci-export

      - name: Log in to GHCR
        if: ${{ github.event_name != 'pull_request' && (github.event.inputs.push_image != 'false') }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to GHCR
        if: ${{ github.event_name != 'pull_request' && (github.event.inputs.push_image != 'false') }}
        run: |
          IMAGE_TAG="${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}"
          DATE_TAG=$(date -u +%Y%m%d)
          skopeo copy oci:/tmp/oci-export "docker://${IMAGE_TAG}:${DATE_TAG}"
          skopeo copy oci:/tmp/oci-export "docker://${IMAGE_TAG}:latest"
          echo "Pushed ${IMAGE_TAG}:latest"

      - name: Build summary
        if: always()
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Target**: \`$BST_TARGET\`" >> $GITHUB_STEP_SUMMARY
          echo "- **BuildGrid**: \`$BUILDGRID_ENDPOINT\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Image**: \`${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}:latest\`" >> $GITHUB_STEP_SUMMARY
